<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>HKEX News Viewer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="container">
      <button class="theme-toggle" id="themeToggle" title="Switch theme">🌓 Theme</button>
      
      <header>
        <h1>HKEX News Viewer</h1>
        <div class="header-right">
        <div class="datetime-display" id="datetimeDisplay">
          <span class="date" id="currentDate"></span>
          <span class="time" id="currentTime"></span>
          <span class="last-fetch-time" id="lastFetchTime"></span>
        </div>
          <div class="controls">
            <input id="search" placeholder="Search news..." />
            <div class="date-filter-container">
              <div class="date-filter-dropdown" id="dateFilterDropdown">
                <div class="date-filter-selected" id="dateFilterSelected">
                  All dates
                </div>
                <div class="date-filter-options" id="dateFilterOptions" style="display: none;">
                  <div class="date-filter-presets">
                    <button class="date-preset-btn" data-range="today">Today</button>
                    <button class="date-preset-btn" data-range="this-week">This Week</button>
                    <button class="date-preset-btn" data-range="this-month">This Month</button>
                    <button class="date-preset-btn" data-range="custom">Custom Range</button>
                  </div>
                  <div class="date-range-inputs" id="dateRangeInputs" style="display: none;">
                    <input type="date" id="dateStart" placeholder="Start date" />
                    <span>to</span>
                    <input type="date" id="dateEnd" placeholder="End date" />
                    <button id="applyDateRange">Apply</button>
                    <button id="clearDateRange">Clear</button>
                  </div>
                </div>
              </div>
            </div>
            <div class="news-type-filter-container">
              <div class="news-type-dropdown" id="newsTypeFilterDropdown">
                <div class="news-type-selected" id="newsTypeFilterSelected">
                  All types
                </div>
                <div class="news-type-options" id="newsTypeFilterOptions" style="display: none;">
                  <div class="news-type-list" id="newsTypeList">
                    <!-- News types will be populated here -->
                  </div>
                  <div class="news-type-actions">
                    <button id="selectNewsTypes">Apply</button>
                    <button id="clearNewsTypes">Clear</button>
                  </div>
                </div>
              </div>
            </div>
<div class="stock-filter-container">
  <div class="stock-filter-dropdown" id="stockFilterDropdown">
    <div class="stock-filter-selected" id="stockFilterSelected">
      All stocks
    </div>
    <div class="stock-filter-options" id="stockFilterOptions" style="display: none;">
      <input type="text" class="stock-filter-search" id="stockFilterSearch" placeholder="Search stock code or company name..." />
      <div class="stock-filter-list" id="stockFilterList">
        <!-- Stock checkboxes will be populated here -->
      </div>
      <div class="stock-filter-actions">
        <button id="selectStocks">Apply</button>
        <button id="clearStocks">Clear</button>
      </div>
    </div>
  </div>
</div>
            <label for="summaryLength" class="sr">Summary</label>
            <select id="summaryLength" title="Summary length">
              <option value="short">Short (80)</option>
              <option value="medium" selected>Medium (200)</option>
              <option value="full">Full</option>
            </select>
            <button id="refresh">Fetch latest</button>
          </div>
        </div>
      </header>

      <section class="presets">
        <h3>Presets & Filters</h3>
        <div id="presetsList"></div>
        <div class="filter-group">
          <label for="stockCodeFilter">Filter by Stock Code:</label>
          <select id="stockCodeFilter" title="Filter by stock code">
            <option value="">All stocks</option>
          </select>
        </div>
      </section>

      <section id="list">
        <h3>News</h3>
        <div id="newsList">Loading...</div>
        <div id="pagination" class="pagination"></div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
